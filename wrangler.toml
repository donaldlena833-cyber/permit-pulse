name = "permit-pulse-scanner"
main = "permit-scanner.mjs"
compatibility_date = "2024-01-01"

# Runs daily at 7am ET (12:00 UTC, accounting for EDT)
[triggers]
crons = ["0 12 * * *"]

[vars]
NOTIFY_EMAIL = "operations@metroglasspro.com"

# KV namespace for tracking picked architects (no repeats)
# Create with: npx wrangler kv namespace create PERMIT_PULSE
# Then paste the ID below
[[kv_namespaces]]
binding = "PERMIT_PULSE"
id = "YOUR_KV_NAMESPACE_ID_HERE"

# SECRETS (set via CLI, not in this file):
# npx wrangler secret put RESEND_API_KEY
