name = "permit-pulse-scanner"
main = "permit-scanner.mjs"
compatibility_date = "2024-01-01"

# Daily at 7am ET (12:00 UTC during EDT) — main scan + reply check + follow-ups
# Also at 6pm ET (23:00 UTC) — reply check + follow-ups only
[triggers]
crons = ["0 12 * * *", "0 23 * * *"]

[vars]
NOTIFY_EMAIL = "operations@metroglasspro.com"
GMAIL_SENDER = "operations@metroglasspro.com"

# KV namespace — stores picked architects + email draft queue
# Create: npx wrangler kv namespace create PERMIT_PULSE
# Then paste the ID below
[[kv_namespaces]]
binding = "PERMIT_PULSE"
id = "6bd0ca87c13d448c80381159511f8e40"

# SECRETS (set via CLI):
# npx wrangler secret put RESEND_API_KEY          — for the digest notification email
# npx wrangler secret put GOOGLE_SERVICE_ACCOUNT  — JSON key for Gmail API (domain-wide delegation)
# npx wrangler secret put APOLLO_API_KEY          — for contact enrichment (free tier: 10K/mo)
