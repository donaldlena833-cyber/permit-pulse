name = "permit-pulse-scanner"
main = "worker/permit-pulse/index.mjs"
compatibility_date = "2024-01-01"

[limits]
cpu_ms = 300_000
subrequests = 50_000

# Every 30 minutes. The worker gates execution to the exact New York local pilot slots.
[triggers]
crons = ["*/30 * * * *"]

# KV namespace — stores picked architects + email draft queue
# Create: npx wrangler kv namespace create PERMIT_PULSE
# Then paste the ID below
[[kv_namespaces]]
binding = "PERMIT_PULSE"
id = "6bd0ca87c13d448c80381159511f8e40"

# SECRETS (set via CLI):
# npx wrangler secret put RESEND_API_KEY          — for the digest notification email
# npx wrangler secret put GOOGLE_SERVICE_ACCOUNT  — JSON key for Gmail API (domain-wide delegation)
# npx wrangler secret put APOLLO_API_KEY          — for contact enrichment (free tier: 10K/mo)
# npx wrangler secret put BRAVE_API_KEY           — company resolution search
# npx wrangler secret put GOOGLE_MAPS_API_KEY     — geocoding and place matching
# npx wrangler secret put ZEROBOUNCE_API_KEY      — email verification before send
# npx wrangler secret put FIRECRAWL_API_KEY       — scrape high-value websites
# npx wrangler secret put GMAIL_CLIENT_ID         — Gmail OAuth client
# npx wrangler secret put GMAIL_CLIENT_SECRET     — Gmail OAuth client secret
# npx wrangler secret put GMAIL_TOKEN_ENCRYPTION_KEY — symmetric key used with pgcrypto tenant credential encryption
# npx wrangler secret put GMAIL_REFRESH_TOKEN     — MetroGlass fallback only during migration
# npx wrangler secret put SUPABASE_URL            — Supabase project URL
# npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY — preferred for secure worker-only REST access
# npx wrangler secret put SUPABASE_ANON_KEY       — fallback only, keep temporarily while migrating
# Tenant attachment onboarding example:
#   node scripts/upload-attachment.mjs --tenant metroglasspro --file "/absolute/path/MetroGlass Pro - About Us.pdf"
